name: Deploy PlateIQ to GitHub Pages

on:
  # Auto-deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manually re-running a deploy from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true provisions the Pages site on the first run,
        # so no manual "Settings -> Pages" toggle is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is a static site served from the repo root.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
